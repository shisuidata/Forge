# ──────────────────────────────────────────────────────────────────────────────
# field_conventions.registry.yaml — 字段使用约定库
#
# 用途：
#   描述某些字段或表在业务上的正确使用方式，注入 LLM 提示以减少生成错误。
#   与 disambiguations 的区别：
#     disambiguations = 词义歧义（"销售额"是什么）
#     field_conventions = 使用规范（"category_id 要不要放进 GROUP BY"）
#
# applies_to：该约定适用的字段或表（table.column 或 table 格式）
# convention：具体的使用规范文本，注入 LLM 系统提示
# confirmed_by_users：true 表示已有用户场景验证
# ──────────────────────────────────────────────────────────────────────────────

order_status_filter:
  label: 订单状态过滤原则
  applies_to: [orders.status, order_items.order_id]
  convention: |
    - 纯维度统计（"各品类总销售额"、"商品销量排行"）→ 不需要加 order_status 过滤
    - 用户行为分析（"消费轨迹"、"下单时间间隔"、"复购分析"）→ 默认加 order_status = '已完成'
    - 若用户明确要求看全部状态或特定状态，以用户要求为准
  confirmed_by_users: false

category_group_by:
  label: 品类 GROUP BY 与 PARTITION BY
  applies_to: [products.category_id, dim_category.name]
  convention: |
    当按品类名称分组时，如果 schema 中存在 category_id 字段，
    应同时将 category_id 纳入 GROUP BY（或 PARTITION BY），
    因为 dim_category 中可能存在同名但不同 ID 的品类，
    仅按名称分组可能造成数据错误合并。
    示例：group: ["products.category_id", "dim_category.name"]
  confirmed_by_users: false

lag_lead_order:
  label: LAG/LEAD 时序方向
  applies_to: [orders.created_at, order_items.created_at]
  convention: |
    LAG/LEAD 窗口函数的 order 字段必须使用时间字段 ASC 排序，
    表示"按时间顺序，取上一条/下一条记录"。
    切勿使用 DESC，那会导致 LAG 取到的是时间更晚的记录（逻辑反转）。
    正确写法：{"col": "orders.created_at", "dir": "asc"}
  confirmed_by_users: false

unit_price_calculation:
  label: 客单价计算粒度
  applies_to: [orders.total_amount, users.id]
  convention: |
    "客单价"通常指单个订单的平均金额（AVG(orders.total_amount)），
    不是用户消费总额的平均（SUM/COUNT 用户级别）。
    "客单价在 X 到 Y 之间"是对单个订单的过滤（filter），而非对用户平均消费的 HAVING 过滤。
  confirmed_by_users: false
