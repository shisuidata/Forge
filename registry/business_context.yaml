# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  Forge 业务上下文（Business Context）                                     ║
# ║  给 Analysis Agent 提供行业知识、阈值标准、日历事件等业务规则。               ║
# ║  支持 org 级（全局）和 team 级（覆盖），通过 Web UI / 对话 / 导入维护。       ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ── 阈值标准（什么数值算正常/异常）─────────────────────────────────────────────
thresholds:
  refund_rate:
    label: "退款率"
    normal_range: [0.03, 0.05]
    warning: 0.08
    critical: 0.10
    unit: "比率"
    note: "低于3%优秀，3-5%正常，超过8%需关注，超过10%需告警"

  order_growth_mom:
    label: "订单量环比增长"
    normal_range: [-0.15, 0.30]
    unit: "比率"
    note: "±15%为正常季节性波动，超过30%可能有大促影响"

  customer_unit_price:
    label: "客单价"
    baseline: 150
    unit: "元"
    note: "行业平均客单价，低于100元需分析原因"

# ── 日历事件（影响数据趋势的关键节点）─────────────────────────────────────────
calendar:
  promotions:
    - name: "618"
      start: "06-10"
      end: "06-20"
      expected_lift: 2.0
      note: "订单量预期翻倍"

    - name: "双11"
      start: "11-01"
      end: "11-15"
      expected_lift: 3.0
      note: "年度最大促销，订单量3倍"

    - name: "双12"
      start: "12-08"
      end: "12-15"
      expected_lift: 1.5

  seasons:
    - name: "春节"
      start: "01-20"
      end: "02-10"
      expected_impact: -0.3
      note: "物流停运，订单量通常下降30%"

    - name: "暑期"
      start: "07-01"
      end: "08-31"
      expected_impact: 0.1
      note: "部分品类（教育/旅游）上升"

# ── 组织架构（区域/部门/团队）──────────────────────────────────────────────────
org_structure:
  regions:
    华北: ["北京", "天津", "河北", "山东"]
    华东: ["上海", "江苏", "浙江", "安徽"]
    华南: ["广州", "深圳", "东莞", "佛山"]
    华中: ["武汉", "长沙", "郑州"]
    西南: ["成都", "重庆", "昆明"]

# ── 行业基准 ──────────────────────────────────────────────────────────────────
benchmarks:
  industry: "电商零售"
  avg_order_value: 150
  avg_repurchase_rate: 0.25
  avg_refund_rate: 0.04
  avg_conversion_rate: 0.03
  source: "行业公开数据"
  updated: "2025-12"

# ── 业务规则 ──────────────────────────────────────────────────────────────────
rules:
  - key: "completed_order"
    rule: "统计订单数/金额时，默认只统计状态为'已完成'的订单"
    scope: "全局"

  - key: "gmv_definition"
    rule: "GMV = 所有下单金额（含退款），销售额 = GMV - 退款金额"
    scope: "全局"

  - key: "new_user_window"
    rule: "新用户定义：注册日期在统计周期内的用户"
    scope: "全局"
