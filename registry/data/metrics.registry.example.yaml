# Forge 语义层模板 — 复制为 metrics.registry.yaml 后使用
#
# 两种指标类型：
#   atomic     原子指标 — 直接基于数据库字段计算，不可再拆分
#   derivative 衍生指标 — 由两个原子指标通过比率关系组合而成
#
# ── 原子指标字段说明 ──────────────────────────────────────────────────────────
#   label        显示名称（必填）
#   description  自然语言定义，供 LLM 理解（必填）
#   measure      度量字段，格式 table.column（必填）
#   aggregation  聚合方式：sum | count | count_distinct | avg | min | max（必填）
#   qualifiers   业务限定，永远生效，LLM 不可省略（可选，sum/avg 类型建议填写）
#   period_col   时间字段，用户指定统计周期时作用于此（可选）
#   dimensions   支持的分析维度，限定合法的 GROUP BY 范围（可选）
#   notes        边界说明、历史决策记录（可选）
#
# ── 衍生指标字段说明 ──────────────────────────────────────────────────────────
#   label        显示名称（必填）
#   description  自然语言定义（必填）
#   numerator    分子，引用原子指标名称（必填）
#   denominator  分母，引用原子指标名称（必填）
#   period_col   时间字段，统一应用于分子和分母（建议填写）
#   dimensions   支持的分析维度（可选）
#   notes        当分子/分母的 qualifiers 不一致时，必须在此说明原因

# ── 原子指标示例 ──────────────────────────────────────────────────────────────

order_amount:
  metric_class: atomic
  label: 订单金额
  description: 已完成订单的成交金额
  measure: orders.total_amount
  aggregation: sum
  qualifiers:
    - "orders.status = 'completed'"
  period_col: orders.created_at
  dimensions:
    - users.city
    - products.category
    - orders.created_at

order_count:
  metric_class: atomic
  label: 订单数
  description: 已完成订单的总数量
  measure: orders.id
  aggregation: count_distinct
  qualifiers:
    - "orders.status = 'completed'"
  period_col: orders.created_at
  dimensions:
    - users.city
    - users.is_vip

repurchase_users:
  metric_class: atomic
  label: 复购用户数
  description: 在统计周期内下过 2 次及以上订单的去重用户数
  measure: orders.user_id
  aggregation: count_distinct
  period_col: orders.created_at
  dimensions:
    - users.city
    - users.is_vip

ordered_users:
  metric_class: atomic
  label: 有过下单记录的用户数
  description: 在统计周期内至少下过一次订单的去重用户数
  measure: orders.user_id
  aggregation: count_distinct
  period_col: orders.created_at
  dimensions:
    - users.city
    - users.is_vip

# ── 衍生指标示例 ──────────────────────────────────────────────────────────────

repurchase_rate:
  metric_class: derivative
  label: 复购率
  description: 有重复购买行为的用户占有过下单记录的用户的比例
  numerator: repurchase_users
  denominator: ordered_users
  period_col: orders.created_at
  dimensions:
    - users.city
    - users.is_vip
  notes: |
    分子和分母均无 status 限定
    时间窗口统一通过 period_col 在查询时注入

avg_order_value:
  metric_class: derivative
  label: 客单价
  description: 平均每笔已完成订单的成交金额
  numerator: order_amount
  denominator: order_count
  period_col: orders.created_at
  dimensions:
    - users.city
    - users.is_vip
  notes: |
    分子分母均限定 status='completed'，口径一致
