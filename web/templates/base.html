<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Forge 管理后台{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen bg-gray-100 font-sans text-sm text-gray-800">

  <!-- 侧边栏 -->
  <aside class="w-52 flex-shrink-0 bg-gray-900 text-gray-200 flex flex-col">
    <div class="px-6 py-5 border-b border-gray-700">
      <span class="text-white font-semibold text-base tracking-wide">⚙ Forge 管理后台</span>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/admin/registry"
         class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-700 transition-colors
                {% if active == 'registry' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
        </svg>
        指标注册表
      </a>
      <a href="/admin/semantic"
         class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-700 transition-colors
                {% if active == 'semantic' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/>
        </svg>
        语义规则
      </a>
      <a href="/admin/staging"
         class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-700 transition-colors
                {% if active == 'staging' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8l1 12a2 2 0 002 2h8a2 2 0 002-2L19 8"/>
        </svg>
        Staging
      </a>
      <a href="/admin/audit"
         class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-700 transition-colors
                {% if active == 'audit' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
                   M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        查询审计
      </a>
      <a href="/admin/settings"
         class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-700 transition-colors
                {% if active == 'settings' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0
                   002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0
                   001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0
                   00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0
                   00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0
                   00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0
                   00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0
                   001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        系统配置
      </a>
    </nav>
    <div class="px-6 py-4 border-t border-gray-700 text-xs text-gray-500">
      Forge v0.1.0
    </div>
  </aside>

  <!-- 主内容区 -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white border-b border-gray-200 px-8 py-4">
      <h1 class="text-lg font-semibold text-gray-900">{% block heading %}{% endblock %}</h1>
    </header>
    <main class="flex-1 overflow-y-auto px-8 py-6">
      {% block content %}{% endblock %}
    </main>
  </div>

</body>
</html>
