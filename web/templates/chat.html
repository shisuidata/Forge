  <style>
    /* SQL 代码块样式 */
    .sql-block {
      background: #1e293b;
      color: #e2e8f0;
      border-radius: 0.5rem;
      padding: 1rem;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 0.8125rem;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .sql-block .kw { color: #93c5fd; font-weight: 600; }
    .sql-block .fn { color: #a5b4fc; }
    .sql-block .str { color: #86efac; }
    .sql-block .num { color: #fbbf24; }
    .sql-block .op { color: #94a3b8; }

    /* 消息气泡 */
    .msg-user { background: #f0f9ff; border: 1px solid #bae6fd; }
    .msg-bot  { background: #ffffff; border: 1px solid #e5e7eb; }
    .msg-system { background: #fefce8; border: 1px solid #fde68a; }

    /* 输入框自适应高度 */
    #chat-input {
      min-height: 2.5rem;
      max-height: 8rem;
      resize: none;
      overflow-y: auto;
    }

    /* 打字动画 */
    .typing-dots span {
      animation: blink 1.4s infinite both;
      display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: #94a3b8; margin: 0 2px;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    /* 滚动条 */
    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>

<script>
const USER_ID = 'web_user_' + Math.random().toString(36).slice(2, 8);
const messagesEl = document.getElementById('chat-messages');
const form = document.getElementById('chat-form');
const input = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
let isWaiting = false;
let welcomeVisible = true;

// ── 工具函数 ──────────────────────────────────────────────────────────────────

function scrollToBottom() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
}

function highlightSQL(sql) {
  const keywords = /\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|CROSS|ON|AND|OR|NOT|IN|IS|NULL|AS|GROUP|BY|ORDER|HAVING|LIMIT|OFFSET|DISTINCT|CASE|WHEN|THEN|ELSE|END|UNION|ALL|EXISTS|BETWEEN|LIKE|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER|TABLE|INDEX|WITH|OVER|PARTITION|ROWS|RANGE|UNBOUNDED|PRECEDING|FOLLOWING|CURRENT|ROW|ASC|DESC|ANTI|SEMI|ROUND|CAST|COALESCE|NULLIF|FILTER)\b/gi;
  const functions = /\b(COUNT|SUM|AVG|MIN|MAX|COUNT_DISTINCT|ROW_NUMBER|RANK|DENSE_RANK|LAG|LEAD|FIRST_VALUE|LAST_VALUE|JULIANDAY|DATE|STRFTIME|IFNULL|LENGTH|SUBSTR|TRIM|UPPER|LOWER|CONCAT|ABS)\b/gi;
  const strings = /('[^']*')/g;
  const numbers = /\b(\d+\.?\d*)\b/g;

  let h = sql
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(strings, '<span class="str">$1</span>')
    .replace(keywords, '<span class="kw">$1</span>')
    .replace(functions, '<span class="fn">$1</span>')
    .replace(numbers, '<span class="num">$1</span>');
  return h;
}

function addMessage(role, content, extra) {
  if (welcomeVisible) {
    messagesEl.innerHTML = '';
    welcomeVisible = false;
  }

  const wrapper = document.createElement('div');
  wrapper.className = 'max-w-2xl mx-auto flex ' + (role === 'user' ? 'justify-end' : 'justify-start');

  const bubble = document.createElement('div');
  const baseClass = role === 'user' ? 'msg-user' : (role === 'system' ? 'msg-system' : 'msg-bot');
  bubble.className = `${baseClass} rounded-xl px-4 py-3 max-w-lg shadow-sm`;

  if (role === 'user') {
    bubble.innerHTML = `<p class="text-sm text-gray-800 whitespace-pre-wrap">${escapeHtml(content)}</p>`;
  } else if (extra && extra.sql) {
    // SQL 预览消息
    bubble.className = 'msg-bot rounded-xl px-4 py-3 max-w-2xl shadow-sm w-full';
    bubble._rawSQL = extra.sql;
    bubble._isEditing = false;
    bubble.innerHTML = `
      ${content ? `<p class="text-sm text-gray-700 mb-3">${escapeHtml(content)}</p>` : ''}
      <div class="sql-display">
        <div class="sql-block mb-3">${highlightSQL(extra.sql)}</div>
      </div>
      <textarea class="sql-editor hidden w-full border border-gray-600 rounded-lg px-3 py-2 mb-3 font-mono text-xs leading-relaxed bg-slate-800 text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" rows="8" spellcheck="false">${escapeHtml(extra.sql)}</textarea>
      <div class="flex items-center gap-2">
        <button onclick="approveSQL(this)" class="bg-green-600 text-white text-xs font-medium px-4 py-2 rounded-lg hover:bg-green-700 transition-colors">
          确认执行
        </button>
        <button onclick="cancelSQL(this)" class="bg-gray-200 text-gray-700 text-xs font-medium px-4 py-2 rounded-lg hover:bg-gray-300 transition-colors">
          取消
        </button>
        <button onclick="toggleEditSQL(this)" class="text-blue-500 hover:text-blue-700 text-xs px-2 py-2 transition-colors">
          编辑 SQL
        </button>
        <button onclick="copySQL(this, '${encodeURIComponent(extra.sql)}')" class="text-gray-400 hover:text-gray-600 text-xs px-2 py-2 transition-colors">
          复制 SQL
        </button>
      </div>
    `;
  } else {
    bubble.innerHTML = `<p class="text-sm text-gray-700 whitespace-pre-wrap">${formatText(content)}</p>`;
  }

  wrapper.appendChild(bubble);
  messagesEl.appendChild(wrapper);
  scrollToBottom();
  return wrapper;
}

function addTypingIndicator() {
  const wrapper = document.createElement('div');
  wrapper.id = 'typing-indicator';
  wrapper.className = 'max-w-2xl mx-auto flex justify-start';
  wrapper.innerHTML = `
    <div class="msg-bot rounded-xl px-4 py-3 shadow-sm">
      <div class="typing-dots flex items-center gap-0.5">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  messagesEl.appendChild(wrapper);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatText(text) {
  // 简单 markdown 格式：**bold**、`code`、换行
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code class="bg-gray-100 text-gray-800 px-1 py-0.5 rounded text-xs font-mono">$1</code>')
    .replace(/\n/g, '<br>');
}

function setWaiting(v) {
  isWaiting = v;
  sendBtn.disabled = v;
  input.disabled = v;
  if (v) addTypingIndicator();
  else removeTypingIndicator();
}

// ── API 调用 ──────────────────────────────────────────────────────────────────

async function sendMessage(text) {
  addMessage('user', text);
  setWaiting(true);

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, user_id: USER_ID }),
    });
    const data = await resp.json();

    if (data.action === 'sql_review' && data.sql) {
      const retryHint = data.retry_count > 0 ? ` (经过 ${data.retry_count} 次修正)` : '';
      addMessage('bot', (data.text || 'SQL 已生成，请审核：') + retryHint, { sql: data.sql });
    } else if (data.action === 'error') {
      addMessage('system', data.text || '处理出错，请重试。');
    } else {
      addMessage('bot', data.text || '(无回复)');
    }
  } catch (err) {
    addMessage('system', '网络错误：' + err.message);
  } finally {
    setWaiting(false);
    input.focus();
  }
}

function toggleEditSQL(btn) {
  const bubble = btn.closest('.msg-bot');
  const display = bubble.querySelector('.sql-display');
  const editor = bubble.querySelector('.sql-editor');
  bubble._isEditing = !bubble._isEditing;
  if (bubble._isEditing) {
    display.classList.add('hidden');
    editor.classList.remove('hidden');
    editor.focus();
    btn.textContent = '预览';
    btn.className = 'text-yellow-600 hover:text-yellow-800 text-xs px-2 py-2 transition-colors';
  } else {
    display.classList.remove('hidden');
    editor.classList.add('hidden');
    // 更新预览
    display.querySelector('.sql-block').innerHTML = highlightSQL(editor.value);
    btn.textContent = '编辑 SQL';
    btn.className = 'text-blue-500 hover:text-blue-700 text-xs px-2 py-2 transition-colors';
  }
}

async function approveSQL(btn) {
  const btnGroup = btn.parentElement;
  const bubble = btn.closest('.msg-bot');
  btnGroup.querySelectorAll('button').forEach(b => b.disabled = true);
  btn.textContent = '执行中...';

  // 检测是否编辑了 SQL
  const editor = bubble.querySelector('.sql-editor');
  const editedSQL = editor ? editor.value.trim() : '';
  const isEdited = editedSQL && editedSQL !== bubble._rawSQL;

  try {
    let resp;
    if (isEdited) {
      // 用户编辑过 SQL → 直接执行编辑后的 SQL
      resp = await fetch('/api/execute-raw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sql: editedSQL, user_id: USER_ID }),
      });
    } else {
      // 原始 SQL → 走正常审核流程
      resp = await fetch('/api/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: '', user_id: USER_ID }),
      });
    }
    const data = await resp.json();

    btnGroup.innerHTML = '<span class="text-green-600 text-xs font-medium">&#10003; 已执行</span>';

    if (data.exec_error) {
      addMessage('system', data.exec_error);
    } else if (data.columns && data.rows && data.rows.length > 0) {
      addResultTable(data.columns, data.rows, data.row_count);
    } else if (data.columns && data.row_count === 0) {
      addMessage('bot', '查询完成，结果为空。');
    } else if (data.text) {
      addMessage('bot', data.text);
    }

    // Pipeline 后续阶段结果（分析报告 + 图表）
    if (data.analysis) {
      addAnalysisCard(data.analysis);
    }
    if (data.chart_html) {
      addChartCard(data.chart_html);
    }
  } catch (err) {
    addMessage('system', '执行失败：' + err.message);
    btnGroup.querySelectorAll('button').forEach(b => b.disabled = false);
    btn.textContent = '确认执行';
  }
}

function addResultTable(columns, rows, totalCount) {
  if (welcomeVisible) { messagesEl.innerHTML = ''; welcomeVisible = false; }

  const wrapper = document.createElement('div');
  wrapper.className = 'max-w-3xl mx-auto flex justify-start';

  // 只展示前 50 行
  const displayRows = rows.slice(0, 50);
  const truncated = rows.length > 50;

  let html = `
    <div class="msg-bot rounded-xl shadow-sm w-full overflow-hidden">
      <div class="px-4 py-2.5 bg-gray-50 border-b border-gray-200 flex items-center justify-between">
        <span class="text-xs font-medium text-gray-700">查询结果</span>
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-400">${totalCount} 行 × ${columns.length} 列</span>
          <button onclick="downloadCSV(this)" class="text-xs text-gray-500 hover:text-gray-800 px-2 py-1 rounded hover:bg-gray-200 transition-colors">CSV</button>
          <button onclick="downloadJSON(this)" class="text-xs text-gray-500 hover:text-gray-800 px-2 py-1 rounded hover:bg-gray-200 transition-colors">JSON</button>
        </div>
      </div>
      <div class="overflow-x-auto max-h-96">
        <table class="min-w-full text-xs">
          <thead class="bg-gray-50 sticky top-0">
            <tr>
              ${columns.map(c => `<th class="px-3 py-2 text-left font-semibold text-gray-600 whitespace-nowrap border-b border-gray-200">${escapeHtml(String(c))}</th>`).join('')}
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            ${displayRows.map((row, i) => `
              <tr class="${i % 2 === 0 ? 'bg-white' : 'bg-gray-50/50'} hover:bg-blue-50/40">
                ${row.map(v => `<td class="px-3 py-1.5 text-gray-800 whitespace-nowrap font-mono">${escapeHtml(v === null ? 'NULL' : String(v))}</td>`).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      ${truncated ? `<div class="px-4 py-2 bg-gray-50 border-t border-gray-200 text-xs text-gray-400">仅显示前 50 行</div>` : ''}
    </div>
  `;

  wrapper.innerHTML = html;
  // 将完整数据存到 DOM 元素上，供导出使用
  wrapper.querySelector('.msg-bot')._exportData = { columns, rows };
  messagesEl.appendChild(wrapper);
  scrollToBottom();
}

function _findExportData(btn) {
  return btn.closest('.msg-bot')._exportData;
}

function downloadCSV(btn) {
  const { columns, rows } = _findExportData(btn);
  const escapeCsvCell = (v) => {
    const s = v === null ? '' : String(v);
    return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const lines = [columns.map(escapeCsvCell).join(',')];
  for (const row of rows) {
    lines.push(row.map(escapeCsvCell).join(','));
  }
  // BOM 头确保 Excel 识别 UTF-8
  const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'forge_result_' + new Date().toISOString().slice(0, 19).replace(/[:-]/g, '') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadJSON(btn) {
  const { columns, rows } = _findExportData(btn);
  const data = rows.map(row => {
    const obj = {};
    columns.forEach((col, i) => { obj[col] = row[i]; });
    return obj;
  });
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'forge_result_' + new Date().toISOString().slice(0, 19).replace(/[:-]/g, '') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

async function cancelSQL(btn) {
  const btnGroup = btn.parentElement;

  try {
    const resp = await fetch('/api/cancel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: '', user_id: USER_ID }),
    });
    const data = await resp.json();
    btnGroup.innerHTML = '<span class="text-gray-400 text-xs">已取消</span>';
  } catch (err) {
    addMessage('system', '取消失败：' + err.message);
  }
}

function copySQL(btn, encodedSql) {
  const sql = decodeURIComponent(encodedSql);
  navigator.clipboard.writeText(sql).then(() => {
    const orig = btn.textContent;
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function useSuggestion(text) {
  input.value = text;
  sendMessage(text);
  input.value = '';
}

// ── 事件绑定 ──────────────────────────────────────────────────────────────────

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text || isWaiting) return;
  input.value = '';
  input.style.height = 'auto';
  sendMessage(text);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.dispatchEvent(new Event('submit'));
  }
});

// 输入框自适应高度
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 128) + 'px';
});

input.focus();

// ── Pipeline 分析报告卡片 ────────────────────────────────────────────────────
function addAnalysisCard(analysis) {
  if (welcomeVisible) { messagesEl.innerHTML = ''; welcomeVisible = false; }
  const wrapper = document.createElement('div');
  wrapper.className = 'max-w-3xl mx-auto flex justify-start';

  const dirIcon = { up: '↑', down: '↓', stable: '→', mixed: '↕' };
  const dirColor = { up: 'text-green-600', down: 'text-red-600', stable: 'text-gray-600', mixed: 'text-yellow-600' };
  const dir = analysis.trend_direction || '';

  const insightsHtml = (analysis.insights || []).map(i =>
    `<li class="text-xs text-gray-700 leading-relaxed">${escapeHtml(i)}</li>`
  ).join('');

  const metricsHtml = Object.entries(analysis.key_metrics || {}).map(([k, v]) =>
    `<div class="bg-gray-50 rounded px-3 py-2 text-center">
       <div class="text-xs text-gray-500">${escapeHtml(k)}</div>
       <div class="text-sm font-semibold text-gray-900 font-mono">${escapeHtml(String(v))}</div>
     </div>`
  ).join('');

  const recHtml = (analysis.recommendations || []).map(r =>
    `<li class="text-xs text-gray-700 leading-relaxed">${escapeHtml(r)}</li>`
  ).join('');

  wrapper.innerHTML = `
    <div class="msg-bot rounded-xl shadow-sm w-full overflow-hidden">
      <div class="px-4 py-2.5 bg-blue-50 border-b border-blue-100 flex items-center gap-2">
        <span class="text-xs font-medium text-blue-800">📊 数据分析</span>
        ${dir ? `<span class="text-xs font-semibold ${dirColor[dir] || 'text-gray-600'}">${dirIcon[dir] || ''} ${dir}</span>` : ''}
      </div>
      <div class="p-4 space-y-3">
        ${analysis.summary ? `<p class="text-sm font-medium text-gray-900">${escapeHtml(analysis.summary)}</p>` : ''}
        ${metricsHtml ? `<div class="grid grid-cols-3 gap-2">${metricsHtml}</div>` : ''}
        ${insightsHtml ? `<div><div class="text-xs font-semibold text-gray-500 mb-1">关键洞察</div><ul class="space-y-1 list-disc list-inside">${insightsHtml}</ul></div>` : ''}
        ${recHtml ? `<div><div class="text-xs font-semibold text-gray-500 mb-1">建议</div><ul class="space-y-1 list-disc list-inside">${recHtml}</ul></div>` : ''}
      </div>
    </div>`;
  messagesEl.appendChild(wrapper);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── 图表卡片 ─────────────────────────────────────────────────────────────────
function addChartCard(chartHtml) {
  if (welcomeVisible) { messagesEl.innerHTML = ''; welcomeVisible = false; }
  const wrapper = document.createElement('div');
  wrapper.className = 'max-w-3xl mx-auto flex justify-start';
  wrapper.innerHTML = `
    <div class="msg-bot rounded-xl shadow-sm w-full overflow-hidden">
      <div class="px-4 py-2.5 bg-purple-50 border-b border-purple-100">
        <span class="text-xs font-medium text-purple-800">📈 可视化图表</span>
      </div>
      <div class="p-2">${chartHtml}</div>
    </div>`;
  messagesEl.appendChild(wrapper);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
