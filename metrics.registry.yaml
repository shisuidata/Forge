# Forge 语义层 — 指标定义
# 通过与 Forge 对话定义，或在 Admin UI /admin/registry 中管理
# 建议纳入版本控制，变更需要 review

# ── 原子指标 ──────────────────────────────────────────────────────────────────

order_amount:
  metric_class: atomic
  label: 订单金额
  description: 已完成订单的成交金额
  measure: orders.total_amount
  aggregation: sum
  qualifiers:
    - "orders.status = 'completed'"
  period_col: orders.created_at
  dimensions:
    - users.city
    - products.category
    - orders.created_at

order_count:
  metric_class: atomic
  label: 订单数
  description: 已完成订单的总数量
  measure: orders.id
  aggregation: count_distinct
  qualifiers:
    - "orders.status = 'completed'"
  period_col: orders.created_at
  dimensions:
    - users.city
    - users.is_vip
    - orders.created_at

repurchase_users:
  metric_class: atomic
  label: 复购用户数
  description: 在统计周期内下过 2 次及以上订单的去重用户数
  measure: orders.user_id
  aggregation: count_distinct
  period_col: orders.created_at
  dimensions:
    - users.city
    - users.is_vip

ordered_users:
  metric_class: atomic
  label: 有过下单记录的用户数
  description: 在统计周期内至少下过一次订单的去重用户数
  measure: orders.user_id
  aggregation: count_distinct
  period_col: orders.created_at
  dimensions:
    - users.city
    - users.is_vip

# ── 衍生指标 ──────────────────────────────────────────────────────────────────

repurchase_rate:
  metric_class: derivative
  label: 复购率
  description: 有重复购买行为的用户占有过下单记录的用户的比例
  numerator: repurchase_users
  denominator: ordered_users
  period_col: orders.created_at
  dimensions:
    - users.city
    - users.is_vip
  notes: |
    分子和分母均无 status 限定，因为复购行为本身不依赖订单是否完成
    时间窗口统一通过 period_col 在查询时注入，两侧使用同一窗口

avg_order_value:
  metric_class: derivative
  label: 客单价
  description: 平均每笔已完成订单的成交金额
  numerator: order_amount
  denominator: order_count
  period_col: orders.created_at
  dimensions:
    - users.city
    - users.is_vip
  notes: |
    分子 order_amount 和分母 order_count 均限定 status='completed'
    口径一致，为正确的业务口径
