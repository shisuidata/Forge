name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/test_compiler.py \
                 tests/test_compiler_extended.py \
                 tests/test_compiler_window.py \
                 tests/test_session.py \
                 tests/test_agent_logic.py \
                 tests/test_registry_context.py \
                 tests/test_metric_validator.py \
                 tests/test_sync.py \
                 tests/test_staging_sync.py \
                 -v --tb=short
